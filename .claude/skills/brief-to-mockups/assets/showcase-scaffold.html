<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PRODUCT}} — Mockups</title>
<!--
  ============================================================================
  BRIEF → MOCKUPS showcase scaffold  (skill: brief-to-mockups)
  ----------------------------------------------------------------------------
  HOW TO USE
   1. Fill :root with tokens from the LOCKED style-guide artifact (Phase 1).
      Nothing below :root may contain a raw hex value or font literal (G4).
   2. Add one <section class="screen" id="screen-..."> per Phase 2 inventory row.
   3. Tag every requirement-bearing element with data-fr="FR-NN" (and put the
      screen's primary FRs on the <section>). This makes the Phase 4 coverage
      gate mechanical — the set of covered FRs can be read straight off the DOM.
   4. Leave the .mockup-nav / showScreen() / .screen.active machinery alone:
      it is THROWAWAY HARNESS (G5) and must be discarded in production by
      mockup-to-blade. It is NOT part of the design.
  ============================================================================
-->
<style>
/* ═══════════════════════════════════════════════════════════════════════
   DESIGN TOKENS — populate from the Phase 1 style-guide artifact ONLY.
   Names below are placeholders; replace values, keep them semantic.
   ═══════════════════════════════════════════════════════════════════════ */
:root {
  /* Palette — 4–6 named roles from frontend-design's token system */
  --color-bg:        #ffffff;
  --color-surface:   #f5f5f7;
  --color-ink:       #1a1a2e;
  --color-muted:     #6b7280;
  --color-primary:   #2563eb;
  --color-accent:    #f59e0b;
  --color-success:   #16a34a;
  --color-danger:    #dc2626;
  --color-border:    #e5e7eb;
  --color-on-primary: #ffffff;  /* text/icons on a primary-filled surface */

  /* Type — display + body + utility roles + scale */
  --font-display: Georgia, "Times New Roman", serif;     /* characterful, used with restraint */
  --font-body:    system-ui, -apple-system, sans-serif;  /* readable body */
  --font-utility: ui-monospace, "SF Mono", monospace;    /* captions / data */
  --step-0: 1rem;  --step-1: 1.25rem;  --step-2: 1.6rem;
  --step-3: 2.1rem; --step-4: 2.8rem;

  /* Space + shape */
  --space-1: .5rem; --space-2: 1rem; --space-3: 1.5rem; --space-4: 2.5rem;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.06);
  --maxw: 960px;
}

/* ── minimal reset + base typography (derives from tokens) ───────────────── */
*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0;
  font-family: var(--font-body);
  font-size: var(--step-0);
  line-height: 1.55;
  color: var(--color-ink);
  background: var(--color-bg);
}
h1, h2, h3 { font-family: var(--font-display); line-height: 1.15; margin: 0 0 var(--space-2); }
h1 { font-size: var(--step-4); }
h2 { font-size: var(--step-3); }
h3 { font-size: var(--step-2); }
a { color: var(--color-primary); }
:focus-visible { outline: 3px solid var(--color-accent); outline-offset: 2px; } /* quality floor */

/* example component conventions — replace with the real ones from Phase 1 */
.btn {
  display: inline-flex; align-items: center; gap: var(--space-1);
  padding: .7em 1.2em; border: 0; border-radius: var(--radius);
  font: inherit; font-weight: 600; cursor: pointer;
  background: var(--color-primary); color: var(--color-on-primary);
}
.btn--ghost { background: transparent; color: var(--color-primary); box-shadow: inset 0 0 0 1px var(--color-border); }
.card {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius); padding: var(--space-3); box-shadow: var(--shadow);
}
.screen-body { max-width: var(--maxw); margin: 0 auto; padding: var(--space-4) var(--space-3); }

/* ═══════════════════════════════════════════════════════════════════════
   THROWAWAY HARNESS — discarded in production (G5). Not part of the design.
   ═══════════════════════════════════════════════════════════════════════ */
.mockup-nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; flex-wrap: wrap; gap: 4px;
  padding: 8px; background: #11131a; border-bottom: 2px solid #000;
}
.mockup-nav button {
  font: 600 12px/1 var(--font-utility, monospace);
  padding: 6px 10px; border: 0; border-radius: 6px;
  background: #2a2d3a; color: #cbd5e1; cursor: pointer;
}
.mockup-nav button.is-active { background: var(--color-accent); color: #11131a; }
.screen { display: none; }
.screen.active { display: block; }
</style>
</head>
<body>

<!-- THROWAWAY HARNESS: regenerated by showScreen(); do not ship -->
<nav class="mockup-nav" id="mockupNav" aria-label="Mockup screen switcher (prototype only)"></nav>

<!-- ════════════════ SCREENS ════════════════ -->
<!-- One <section> per Phase 2 inventory row. data-screen-title feeds the nav. -->

<section class="screen active" id="screen-example-landing"
         data-screen-title="Landing" data-fr="FR-01">
  <div class="screen-body">
    <h1>Headline that is the brief's thesis</h1>
    <p data-fr="FR-01">Lead copy in end-user voice — say what this does, plainly.</p>
    <p>
      <button class="btn" data-fr="FR-02">Primary action</button>
      <button class="btn btn--ghost" data-fr="FR-03">Secondary action</button>
    </p>
    <div class="card" data-fr="FR-04">
      <h3>A real piece of content from the brief</h3>
      <p>Replace placeholders with the brief's actual subject matter.</p>
    </div>
  </div>
</section>

<section class="screen" id="screen-example-state"
         data-screen-title="Empty state" data-fr="FR-05">
  <div class="screen-body">
    <h2>Nothing here yet</h2>
    <p data-fr="FR-05">An empty screen is an invitation to act, not a dead end.</p>
    <button class="btn">Do the thing</button>
  </div>
</section>

<!-- ════════════════ /SCREENS ════════════════ -->

<script>
/* THROWAWAY HARNESS — builds the nav from the screens and toggles .active.
   Production navigation is real routes/forms/state; mockup-to-blade drops this. */
(function () {
  var screens = Array.prototype.slice.call(document.querySelectorAll('.screen'));
  var nav = document.getElementById('mockupNav');
  function show(id) {
    screens.forEach(function (s) { s.classList.toggle('active', s.id === id); });
    Array.prototype.forEach.call(nav.children, function (b) {
      b.classList.toggle('is-active', b.dataset.target === id);
    });
    window.scrollTo(0, 0);
  }
  screens.forEach(function (s) {
    var b = document.createElement('button');
    b.textContent = s.dataset.screenTitle || s.id;
    b.dataset.target = s.id;
    b.addEventListener('click', function () { show(s.id); });
    nav.appendChild(b);
  });
  var first = screens.find(function (s) { return s.classList.contains('active'); }) || screens[0];
  if (first) { show(first.id); }
})();
</script>
</body>
</html>
